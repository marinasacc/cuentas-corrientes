<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Cliente - Cuentas Corrientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary px-3">
        <div class="d-flex align-items-center">
            <a href="/" class="btn btn-outline-light btn-sm me-3">
                <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
            <span class="navbar-brand mb-0 h1" id="titulo-cliente">
                <i class="bi bi-person me-2"></i>Cliente
            </span>
        </div>
        <a href="/logout" class="btn btn-sm btn-outline-light" title="Cerrar sesion">
            <i class="bi bi-box-arrow-right"></i>
        </a>
    </nav>

    <div class="container-fluid mt-3">
        <!-- Seccion Datos del Cliente -->
        <div class="row">
            <!-- Info principal -->
            <div class="col-md-8">
                <div class="card mb-3">
                    <div class="card-header bg-light d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-person-badge me-2"></i>Datos del cliente</h5>
                        <button class="btn btn-sm btn-outline-primary" onclick="guardarContacto()">
                            <i class="bi bi-save me-1"></i>Guardar cambios
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-2">
                                    <label class="form-label fw-bold small text-muted">Codigo</label>
                                    <div class="fs-5" id="cliente-codigo"></div>
                                </div>
                                <div class="mb-2">
                                    <label class="form-label fw-bold small text-muted">Nombre</label>
                                    <div class="fs-5" id="cliente-nombre"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-2">
                                    <label class="form-label fw-bold small text-muted">Email</label>
                                    <input type="email" class="form-control" id="cliente-email" placeholder="email@ejemplo.com">
                                </div>
                                <div class="mb-2">
                                    <label class="form-label fw-bold small text-muted">Telefono</label>
                                    <input type="text" class="form-control" id="cliente-telefono" placeholder="11-XXXX-XXXX">
                                </div>
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-12">
                                <label class="form-label fw-bold small text-muted">Notas</label>
                                <textarea class="form-control" id="cliente-notas" rows="2" placeholder="Notas sobre el cliente..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Saldos -->
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-header bg-light">
                        <h5 class="mb-0"><i class="bi bi-cash me-2"></i>Saldos</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-sm mb-0">
                            <tbody>
                                <tr>
                                    <td class="text-muted">0-30 dias</td>
                                    <td class="text-end fw-bold" id="saldo-0-30">$0</td>
                                </tr>
                                <tr>
                                    <td class="text-muted">31-60 dias</td>
                                    <td class="text-end fw-bold" id="saldo-31-60">$0</td>
                                </tr>
                                <tr>
                                    <td class="text-muted">61-90 dias</td>
                                    <td class="text-end fw-bold" id="saldo-61-90">$0</td>
                                </tr>
                                <tr>
                                    <td class="text-muted">+91 dias</td>
                                    <td class="text-end fw-bold text-danger" id="saldo-91-mas">$0</td>
                                </tr>
                                <tr class="table-dark">
                                    <td class="fw-bold">TOTAL</td>
                                    <td class="text-end fw-bold fs-5" id="saldo-total">$0</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Historial de Contacto -->
        <div class="card">
            <div class="card-header bg-light">
                <h5 class="mb-0"><i class="bi bi-chat-dots me-2"></i>Historial de contacto</h5>
            </div>
            <div class="card-body">
                <div id="historial-vacio" class="text-center py-4 text-muted" style="display:none;">
                    <i class="bi bi-chat-square-text fs-1"></i>
                    <p class="mt-2">No hay registros de contacto aun. Usa el boton + para agregar uno.</p>
                </div>
                <div id="historial-lista"></div>
            </div>
        </div>
    </div>

    <!-- Botones flotantes -->
    <div class="fab-container">
        <button class="btn btn-primary fab fab-main" onclick="abrirModalContacto()" title="Nuevo contacto">
            <i class="bi bi-plus-lg"></i>
        </button>
        <button class="btn btn-warning fab fab-secondary" onclick="abrirModalRecordatorio()" title="Enviar recordatorio" style="bottom: 90px;">
            <i class="bi bi-bell"></i>
        </button>
    </div>

    <!-- Modal Nuevo Contacto -->
    <div class="modal fade" id="modalContacto" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Nuevo contacto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Fecha de contacto</label>
                        <input type="date" class="form-control" id="contacto-fecha">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contactado por</label>
                        <select class="form-select" id="contacto-por"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Respuesta del cliente</label>
                        <select class="form-select" id="contacto-respuesta"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Comentario adicional <span class="text-muted">(opcional)</span></label>
                        <textarea class="form-control" id="contacto-comentario" rows="3" placeholder="Detalles de la conversacion..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Proxima fecha de contacto <span class="text-muted">(opcional)</span></label>
                        <input type="date" class="form-control" id="contacto-proxima">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardarNuevoContacto()">
                        <i class="bi bi-save me-1"></i>Guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Recordatorio -->
    <div class="modal fade" id="modalRecordatorio" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title"><i class="bi bi-bell me-2"></i>Enviar recordatorio</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Titulo del recordatorio</label>
                        <input type="text" class="form-control" id="recordatorio-titulo" placeholder="Ej: Contactar a cliente por saldo vencido">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripcion <span class="text-muted">(opcional)</span></label>
                        <textarea class="form-control" id="recordatorio-descripcion" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha del recordatorio</label>
                        <input type="date" class="form-control" id="recordatorio-fecha">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Enviar a:</label>
                        <div id="recordatorio-emails"></div>
                        <div class="mt-2">
                            <div class="input-group input-group-sm">
                                <input type="email" class="form-control" id="nuevo-email" placeholder="Agregar otro email...">
                                <button class="btn btn-outline-secondary" onclick="agregarEmail()">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning" onclick="enviarRecordatorio()">
                        <i class="bi bi-send me-1"></i>Crear evento en Calendar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const CODIGO_CLIENTE = "{{ codigo }}";
    </script>
    <script src="/static/js/detalle.js"></script>
</body>
</html>
