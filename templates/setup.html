<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuracion inicial - Cuentas Corrientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .setup-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
        }
        .setup-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .setup-logo i {
            font-size: 3rem;
            color: #667eea;
        }
        .btn-setup {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="setup-logo">
            <i class="bi bi-gear-fill"></i>
            <h3 class="mt-2">Configuracion inicial</h3>
            <p class="text-muted small">Crea el usuario y contrasena para acceder a la app.<br>
            Sera compartido por todo el equipo.</p>
        </div>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('setup') }}">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">USUARIO</label>
                <input type="text" name="usuario" class="form-control" required autofocus
                       placeholder="ej: tutextil" value="tutextil">
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">CONTRASENA <span class="text-muted">(minimo 6 caracteres)</span></label>
                <input type="password" name="password" class="form-control" required minlength="6">
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">CONFIRMAR CONTRASENA</label>
                <input type="password" name="password2" class="form-control" required minlength="6">
            </div>

            <div class="alert alert-warning small">
                <i class="bi bi-exclamation-triangle me-1"></i>
                <strong>Importante:</strong> Guarda esta contrasena en un lugar seguro. Si la pierdes habra que resetear el archivo de configuracion.
            </div>

            <button type="submit" class="btn btn-primary btn-setup w-100 text-white">
                <i class="bi bi-check-circle me-2"></i>Crear cuenta y entrar
            </button>
        </form>
    </div>
</body>
</html>
