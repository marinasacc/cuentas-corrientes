<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizaciones - Cuentas Corrientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary px-3">
        <div class="d-flex align-items-center">
            <a href="/" class="btn btn-outline-light btn-sm me-3">
                <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-arrow-repeat me-2"></i>Actualizaciones
            </span>
        </div>
        <a href="/logout" class="btn btn-sm btn-outline-light" title="Cerrar sesion">
            <i class="bi bi-box-arrow-right"></i>
        </a>
    </nav>

    <div class="container-fluid mt-3">
        <!-- Info de la carga -->
        <div class="alert alert-info d-flex align-items-center mb-3" id="info-actualizacion">
            <i class="bi bi-info-circle me-2 fs-4"></i>
            <div>
                <strong>Carga:</strong> <span id="info-archivo"></span> |
                <strong>Fecha:</strong> <span id="info-fecha"></span> |
                <strong>Cambios detectados:</strong> <span id="info-cambios" class="badge bg-primary">0</span>
            </div>
        </div>

        <!-- Resumen de cambios -->
        <div class="row mb-3">
            <div class="col-md-4">
                <div class="card border-success">
                    <div class="card-body py-2 text-center">
                        <div class="small text-muted">Pagaron todo</div>
                        <div class="fs-4 fw-bold text-success" id="stat-pagaron">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-warning">
                    <div class="card-body py-2 text-center">
                        <div class="small text-muted">Cambio de saldo</div>
                        <div class="fs-4 fw-bold text-warning" id="stat-cambio-saldo">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-info">
                    <div class="card-body py-2 text-center">
                        <div class="small text-muted">Clientes nuevos</div>
                        <div class="fs-4 fw-bold text-info" id="stat-nuevos">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Buscador -->
        <div class="row mb-3">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="buscador-cambios" class="form-control" placeholder="Buscar por codigo o nombre...">
                </div>
            </div>
            <div class="col-md-7 d-flex gap-2 align-items-center">
                <button class="btn btn-outline-secondary btn-sm filtro-cambio active" data-filtro="">Todos</button>
                <button class="btn btn-outline-success btn-sm filtro-cambio" data-filtro="pago_total">Pagaron</button>
                <button class="btn btn-outline-warning btn-sm filtro-cambio" data-filtro="cambio_saldo">Cambio saldo</button>
                <button class="btn btn-outline-info btn-sm filtro-cambio" data-filtro="nuevo">Nuevos</button>
            </div>
        </div>

        <!-- Grilla de cambios -->
        <div class="table-responsive">
            <table class="table table-hover table-striped align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Tipo</th>
                        <th>Codigo</th>
                        <th>Nombre</th>
                        <th class="text-end">Saldo Anterior</th>
                        <th class="text-end">Saldo Nuevo</th>
                        <th class="text-end">Diferencia</th>
                    </tr>
                </thead>
                <tbody id="tbody-cambios">
                </tbody>
            </table>
        </div>
        <div id="sin-cambios" class="text-center py-4 text-muted" style="display:none;">
            <i class="bi bi-check-circle fs-1 text-success"></i>
            <p class="mt-2">No se detectaron cambios en esta carga.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const CARGA_ID = {{ carga_id }};
    </script>
    <script src="/static/js/actualizaciones.js"></script>
</body>
</html>
